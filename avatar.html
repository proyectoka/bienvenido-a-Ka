<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Despertar del Avatar – Ka</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background-image:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
        url("./fondo.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      padding: 20px;
    }

  .avatar-panel {
  width: 100%;
  max-width: 460px;
  padding: 40px 30px;
  text-align: center;

  background-image: url("panel-magico.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  border: none;
  border-radius: 28px;
  box-shadow: 0 0 30px rgba(0,0,0,0.20);
}

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitulo {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .avatar {
      width: 140px;
      height: 140px;
      margin: 0 auto 20px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 20px rgba(255,255,255,0.25),
        0 0 35px rgba(72,178,186,0.35);
      transition: 0.3s;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.35s;
    }

    .avatar:hover img {
      transform: scale(1.08);
      filter: drop-shadow(0 0 18px #FDBE50);
    }

    .selector {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 24px;
    }

    .btn-mini,
    .btn-principal {
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.25s;
      font-weight: bold;
    }

    .btn-mini {
      padding: 10px 18px;
      background: #FDBE50;
      font-size: 16px;
    }

    .btn-principal {
      width: 100%;
      padding: 14px;
      background: #FBB6AE;
      font-size: 16px;
      margin-top: 18px;
    }

    .btn-mini:hover,
    .btn-principal:hover {
      transform: scale(1.04);
    }

    .campo {
      margin-bottom: 14px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      opacity: 0.95;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      background: rgba(255,255,255,0.92);
      color: #222;
    }

    #ka-mensaje {
      margin-top: 18px;
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.95;
      min-height: 45px;
    }
  </style>
</head>
<body>

  <div class="avatar-panel">
    <h1>El Despertar </h1>

    <p class="subtitulo">
      Ka te observa con calma…<br>
      antes de entrar al universo,
      debes definir tu verdadera esencia 
    </p>

    <div class="avatar">
      <img id="imagenAvatar" src="personaje1.png" alt="Avatar mágico">
    </div>

    <div class="selector">
      <button class="btn-mini" onclick="cambiarAnterior()">⬅</button>
      <button class="btn-mini" onclick="cambiarSiguiente()">➡</button>
    </div>

    <div class="campo">
      <label>Tu nombre mágico</label>
      <input type="text" id="nombre" placeholder="Escribe tu nombre...">
    </div>

    <div class="campo">
      <label>Tu esencia</label>
      <select id="esencia">
        <option value="">Selecciona tu esencia</option>
        <option>Guardiana de la Memoria</option>
        <option>Creador de Luz</option>
        <option>Custodio del Bosque</option>
        <option>Tejedora de Sueños</option>
      </select>
    </div>

    <div class="campo">
      <label>Color de tu aura</label>
      <select id="aura">
        <option value="">Selecciona tu aura</option>
        <option>Turquesa Celestial</option>
        <option>Dorado Solar</option>
        <option>Rosa Lunar</option>
        <option>Verde Musgo</option>
      </select>
    </div>

    <div class="campo">
      <label>Símbolo guardián</label>
      <select id="simbolo">
        <option value="">Selecciona tu símbolo</option>
        <option>Llave Antigua</option>
        <option>Estrella Viva</option>
        <option>Luna Eterna</option>
        <option>Flor Sagrada</option>
      </select>
    </div>

    <button class="btn-principal" onclick="guardar()">
      Entrar al Universo ✨
    </button>

    <p id="ka-mensaje">
      Estoy aquí contigo… tu historia está a punto de comenzar 🌷
    </p>
  </div>

   <script>
const personajes = [
  {
    imagen: "guardiana_memoria.png",
    esencia: "Guardiana de la Memoria",
    aura: "Verde Musgo",
    simbolo: "Llave Antigua"
  },
  {
    imagen: "creador_luz.png",
    esencia: "Creador de Luz",
    aura: "Dorado Solar",
    simbolo: "Estrella Viva"
  },
  {
    imagen: "custodio_bosque.png",
    esencia: "Custodio del Bosque",
    aura: "Turquesa Celestial",
    simbolo: "Flor Sagrada"
  },
  {
    imagen: "tejedora_suenos.png",
    esencia: "Tejedora de Sueños",
    aura: "Rosa Lunar",
    simbolo: "Luna Eterna"
  }
];

let indice = 0;

const img = document.getElementById("imagenAvatar");
const mensaje = document.getElementById("ka-mensaje");

function actualizarAvatar() {
  img.src = personajes[indice].imagen;

  document.getElementById("esencia").value = personajes[indice].esencia;
  document.getElementById("aura").value = personajes[indice].aura;
  document.getElementById("simbolo").value = personajes[indice].simbolo;
}

function cambiarSiguiente() {
  indice = (indice + 1) % personajes.length;
  actualizarAvatar();
}

function cambiarAnterior() {
  indice = (indice - 1 + personajes.length) % personajes.length;
  actualizarAvatar();
}

function guardar() {
  const nombre = document.getElementById("nombre").value.trim();

  if (!nombre) {
    mensaje.innerText = "Ka susurra… tu nombre es parte de tu esencia 🌷";
    return;
  }

  localStorage.setItem("nombreAvatar", nombre);
  localStorage.setItem("personajeAvatar", personajes[indice].imagen);
  localStorage.setItem("esenciaAvatar", personajes[indice].esencia);
  localStorage.setItem("auraAvatar", personajes[indice].aura);
  localStorage.setItem("simboloAvatar", personajes[indice].simbolo);

  mensaje.innerText = `Bienvenida, ${nombre}… el universo ya puede reconocerte 💛`;

  setTimeout(() => {
    window.location.href = "mapa.html";
  }, 1800);
}

actualizarAvatar();
document.body.addEventListener("click", () => {
  document.getElementById("sonidoAmbiente").play();
}, { once: true });
</script>

<audio id="sonidoAmbiente" loop preload="auto">
  <source src="bosque.mp3" type="audio/mpeg">
</audio>
</body>
</html>
