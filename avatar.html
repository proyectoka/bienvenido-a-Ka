<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Avatar – Ka</title>

  <style>
    /* CUERPO Y FONDO */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle, #48B2BA, #1e4d4f);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }

    /* PANEL DEL AVATAR */
    .avatar-panel {
      background: rgba(0,0,0,0.4);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      color: white;
      max-width: 350px;
      width: 90%;
    }

    /* AVATAR */
    .avatar {
      width: 120px;
      height: 120px;
      margin: 20px auto;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
      transition: transform 0.3s, filter 0.3s;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s, filter 0.3s;
    }

    .avatar:hover img {
      transform: scale(1.2);
      filter: drop-shadow(0 0 20px #FDBE50) drop-shadow(0 0 20px #FBB6AE);
      cursor: pointer;
    }

    /* SELECTOR DE FLECHAS */
    .selector {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    /* BOTONES */
    .btn {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: #FBB6AE;
      transition: transform 0.2s;
      font-size: 16px;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    /* INPUT */
    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      width: 80%;
      text-align: center;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="avatar-panel">
    <h2>Crea tu esencia ✨</h2>

    <!-- AVATAR -->
    <div class="avatar" id="avatar">
      <img id="imagenAvatar" src="personaje1.png" alt="Personaje mágico">
    </div>

    <!-- SELECTOR DE PERSONAJES -->
    <div class="selector">
      <button class="btn" onclick="cambiarAnterior()">⬅️</button>
      <button class="btn" onclick="cambiarSiguiente()">➡️</button>
    </div>

    <!-- NOMBRE MÁGICO -->
    <input type="text" id="nombre" placeholder="Tu nombre mágico">

    <br>

    <!-- BOTÓN PARA GUARDAR -->
    <button class="btn" onclick="guardar()">Entrar al mundo</button>
  </div>

  <script>
    // Lista de personajes
    const personajes = ["personaje1.png", "personaje2.png", "personaje3.png"];
    let indice = 0;

    const img = document.getElementById("imagenAvatar");

    // Cambiar al siguiente personaje
    function cambiarSiguiente() {
      indice = (indice + 1) % personajes.length;
      img.src = personajes[indice];
    }

    // Cambiar al personaje anterior
    function cambiarAnterior() {
      indice = (indice - 1 + personajes.length) % personajes.length;
      img.src = personajes[indice];
    }

    // Guardar nombre y personaje en localStorage y entrar al mundo
    function guardar() {
      const nombre = document.getElementById("nombre").value;
      const personaje = img.src;

      localStorage.setItem("nombreAvatar", nombre);
      localStorage.setItem("personajeAvatar", personaje);

      // Redirige a tu página principal
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
