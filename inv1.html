<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación – Ka</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000, #111);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  animation: fadeIn 2s ease;
}

/* FADE IN */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* BOTON VOLVER */
.volver {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  text-decoration: none;
  font-size: 18px;
  z-index: 10;
}

/* VIDEO */
.video-container {
  width: 80%;
  max-width: 800px;
  max-height: 80vh;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 50px rgba(255,255,255,0.25);
  animation: flotar 6s ease-in-out infinite;
}
video {
  width: 100%;
  height: auto;
  max-height: 80vh;
  object-fit: contain;
}
/* FLOTAR SUAVE */
@keyframes flotar {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* BOTON SONIDO */
#sonido {
  position: absolute;
  bottom: 30px;
  background: #FDBE50;
  border: none;
  padding: 12px 20px;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

#sonido:hover {
  transform: scale(1.1);
}

/* PARTICULAS */
.particulas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.particulas span {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.7;
  animation: flotarParticulas linear infinite;
}

@keyframes flotarParticulas {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<a class="volver" href="invitaciones.html">← Volver</a>

<div class="video-container">
  <video id="video" autoplay muted loop playsinline>
    <source src="cumple-video.mp4" type="video/mp4">
  </video>
</div>

<button id="sonido">🔊 Activar sonido</button>

<div class="particulas"></div>

<script>
const video = document.getElementById("video");
const btn = document.getElementById("sonido");

// sonido
btn.addEventListener("click", () => {
  video.muted = false;
  video.play();
  btn.style.display = "none";
});

// partículas
const contenedor = document.querySelector('.particulas');

for (let i = 0; i < 40; i++) {
  let p = document.createElement('span');
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (3 + Math.random() * 5) + 's';
  p.style.opacity = Math.random();
  contenedor.appendChild(p);
}
</script>

</body>
</html>
