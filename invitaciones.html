<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de Invitaciones – Yelioki</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at top, #1b2a3a, #05070c);
  color: white;
}

/* 🌙 CONTENEDOR */
.mundo {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* ✉️ TÍTULO */
h1 {
  font-size: 38px;
  margin-bottom: 10px;
}

p {
  opacity: 0.8;
  margin-bottom: 25px;
}

/* 🪄 MESA MÁGICA */
.mesa {
  width: 320px;
  height: 190px;
  background: linear-gradient(145deg, #FDBE50, #48B2BA);
  border-radius: 25px;
  box-shadow: 0 0 40px rgba(255,255,255,0.2);
  animation: flotar 3s ease-in-out infinite;
  margin-bottom: 25px;
}

@keyframes flotar {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* ✨ ELEMENTOS DECORATIVOS */
.sobre {
  width: 60px;
  height: 40px;
  background: #fff;
  border-radius: 6px;
  position: absolute;
  top: 30%;
  left: 30%;
  opacity: 0.8;
  animation: flotar 4s infinite;
}

.sello {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #FDBE50;
  position: absolute;
  top: 35%;
  right: 28%;
  box-shadow: 0 0 20px #FDBE50;
  animation: flotar 3.5s infinite;
}

/* 🔙 BOTÓN */
button {
  padding: 10px 22px;
  border: none;
  border-radius: 20px;
  background: #48B2BA;
  color: white;
  cursor: pointer;
  font-weight: bold;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

</style>

</head>

<body>

<div class="mundo">

<h1>✉️ Taller de Invitaciones Premium</h1>

<p>Donde cada sobre nace con magia</p>

<div class="mesa"></div>

<!-- elementos mágicos -->
<div class="sobre"></div>
<div class="sello"></div>

<button onclick="volver()">⬅ Volver al Tepuy</button>

</div>

<script>

function volver() {
  window.location.href = "yelioki.html"; 
  // 👆 tu mundo principal (Yelioki Central)
}

</script>

</body>
</html>
