<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ka – Universo Yelioki</title>

<style>

/* ===== CUERPO Y FONDO ===== */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background-image: url('fondo_nuevo.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* ===== TITULO MAGICO ===== */
.titulo {
  position: absolute;
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  width: 650px;
  z-index: 3;
  animation: flotarTitulo 6s ease-in-out infinite, brillo 3s ease-in-out infinite;
}

@keyframes flotarTitulo {
  0% { transform: translateX(-50%) translateY(0px); }
  50% { transform: translateX(-50%) translateY(-8px); }
  100% { transform: translateX(-50%) translateY(0px); }
}

@keyframes brillo {
  0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
  50% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.6)); }
  100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
}

/* ===== TEPUY ===== */
.tepuy {
  position: absolute;
  bottom: 5%;
  left: 50%;
  width: 600px;
  transform: translateX(-50%);
  z-index: 2;
  animation: flotarTepuy 10s ease-in-out infinite;
}

@keyframes flotarTepuy {
  0% { transform: translateX(-50%) translateY(0px); }
  50% { transform: translateX(-50%) translateY(-10px); }
  100% { transform: translateX(-50%) translateY(0px); }
}

/* ===== NUBES ===== */
.cloud {
  position: absolute;
  cursor: pointer;
  z-index: 3;
  animation: flotar 6s ease-in-out infinite;
  transition: transform 0.3s ease, filter 0.3s ease;
}

.cloud:hover {
  transform: scale(1.1);
  filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
}

/* NUBES PC */
.cloud1 { top: 25%; left: 20%; width: 400px; animation-delay: 0s; }
.cloud2 { top: 28%; right: 20%; width: 380px; animation-delay: 2s; }
.cloud3 { top: 50%; left: 40%; width: 420px; animation-delay: 4s; }

@keyframes flotar {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-25px); }
  100% { transform: translateY(0px); }
}

/* ===== PORTAL ===== */
#portal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #ffffff, #48B2BA);
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease;
  z-index: 10;
}

#portal.active {
  opacity: 1;
}

/* ===== PARTICULAS ===== */
.particulas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.particulas span {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #FDBE50;
  border-radius: 50%;
  opacity: 0.7;
  animation: flotarParticulas linear infinite;
}

@keyframes flotarParticulas {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 0.8; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .titulo { width: 320px; top: 6%; }
  .tepuy { width: 300px; }

  /* CENTRAR NUBES EN MOVIL */
  .cloud {
    position: relative;
    display: block;
    margin: 20px auto;
    left: auto !important;
    right: auto !important;
    top: auto !important;
    width: 260px !important;
  }
}

</style>
</head>

<body>

<!-- TITULO -->
<img class="titulo" src="titulo_ka.png" alt="Bienvenido a Ka">

<!-- TEPUY -->
<img class="tepuy" src="tepuy.png">

<!-- NUBES -->
<img class="cloud cloud1" src="nube1.png" onclick="abrirPortal('invitaciones.html')">
<img class="cloud cloud2" src="nube2.png" onclick="abrirPortal('llaves.html')">
<img class="cloud cloud3" src="nube3.png" onclick="abrirPortal('disenos.html')">

<!-- PORTAL -->
<div id="portal"></div>

<!-- PARTICULAS -->
<div class="particulas"></div>

<!-- AUDIO -->
<audio id="musica" loop>
  <source src="sonido.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("musica");

function abrirPortal(pagina) {
  const portal = document.getElementById("portal");
  audio.play();
  portal.classList.add("active");
  setTimeout(() => { window.location.href = pagina; }, 1200);
}

// PARTICULAS
const contenedor = document.querySelector('.particulas');
for (let i = 0; i < 30; i++) {
  let p = document.createElement('span');
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (3 + Math.random() * 5) + 's';
  p.style.opacity = Math.random();
  contenedor.appendChild(p);
}
</script>

</body>
</html>
