<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jardín Mágico – Ka</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle, #48B2BA, #1e4d4f);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* TUNEL */
.tunel {
  width: 80%;
  height: 80%;
  border-radius: 40px;
  position: relative;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.5);
  overflow: hidden;
  background-image: url("tunel.jpg");
  background-size: cover;
  background-position: center;
  animation: moverFondo 60s linear infinite;
}

/* BOTONES */
.btn {
  position: absolute;
  top: 40%;
  padding: 15px 25px;
  border-radius: 20px;
  border: none;
  background: #FDBE50;
  cursor: pointer;
  font-weight: bold;
  transition: transform 0.3s, box-shadow 0.3s;
}
.btn:hover { transform: scale(1.1); }
.izquierda { left: 5%; }
.derecha { right: 5%; }

.tepuy-fondo {
  position: absolute;
  bottom: 10%;
  width: 100%;
  text-align: center;
}
.entrar {
  padding: 12px 30px;
  border-radius: 25px;
  border: none;
  background: #FBB6AE;
  cursor: pointer;
  font-weight: bold;
}

/* DESTACAR */
.destacar {
  animation: brillar 1.5s infinite alternate;
  box-shadow: 0 0 15px #fff6b0, 0 0 30px #FFD700, 0 0 45px #FDBE50;
}
@keyframes brillar {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.15); opacity: 1; }
}

/* PARTICULAS */
.particulas {
  position: absolute;
  width: 100%;
  height: 100%;
}
.particulas span {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #FDBE50;
  border-radius: 50%;
  animation: flotar 6s linear infinite;
}
@keyframes flotar {
  0% { transform: translateY(100px); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

/* HOJAS */
.hojas { position: absolute; width: 100%; height: 100%; }
.hoja { position: absolute; animation: flotarHoja 6s ease-in-out infinite; }
.h1 { top: -10px; left: -10px; width: 260px; }
.h2 { top: -10px; right: -10px; width: 260px; transform: scaleX(-1); }
.h3 { bottom: -10px; left: -10px; width: 260px; }
.h4 { bottom: -10px; right: -10px; width: 260px; transform: scaleX(-1); }

@keyframes flotarHoja {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* LUCIERNAGAS */
.luciernagas { position: absolute; width: 100%; height: 100%; }

.luz {
  position: absolute;
  width: 12px;
  height: 12px;
  background: #fff6b0;
  border-radius: 50%;
  box-shadow: 0 0 10px #fff6b0, 0 0 20px #ffd700;
}

.img-luciernaga {
  position: absolute;
  width: 50px;
  height: 50px;
  background-image: url("luciernaga.png");
  background-size: contain;
  background-repeat: no-repeat;
  filter: drop-shadow(0 0 10px #ffd700);
}

@keyframes flotarLuz {
  0% { transform: translateY(80px); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translateY(-250px); opacity: 0; }
}

/* LIBELULAS */
.libelula {
  position: absolute;
  width: 60px;
  height: 60px;
  background-image: url("libelula.png");
  background-size: contain;
  background-repeat: no-repeat;
  animation: volar 12s linear infinite;
}

@keyframes volar {
  0% { transform: translateX(-120px); opacity:0; }
  10% { opacity:1; }
  100% { transform: translateX(110vw); opacity:0; }
}

/* KA */
#ka-ui {
  position: absolute;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}

#ka-luz {
  width: 60px;
  height: 60px;
  margin: auto;
  border-radius: 50%;
  background: radial-gradient(circle, #48B2BA, transparent);
  box-shadow: 0 0 20px #48B2BA, 0 0 40px #48B2BA;
}

#ka-cuadro {
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 10px;
  color: white;
}
</style>
</head>

<body>

<div class="tunel">

<div class="hojas">
<img src="hoja1.png" class="hoja h1">
<img src="hoja2.png" class="hoja h2">
<img src="hoja3.png" class="hoja h3">
<img src="hoja4.png" class="hoja h4">
</div>

<div class="particulas"></div>
<div class="luciernagas"></div>
<div class="libelulas"></div>

<button class="btn izquierda">Crear Avatar</button>
<button class="btn derecha" style="display:none;">Mapa</button>

<div class="tepuy-fondo" style="display:none;">
  <button class="entrar">Entrar al Tepuy</button>
</div>
<div id="ka-ui">
<div id="ka-luz"></div>
<div id="ka-cuadro">
<p id="ka-texto">Hola… sé que este lugar puede parecer nuevo… 💛</p>
<button onclick="siguienteKa()">Continuar ✨</button>
</div>
</div>

</div>

<script>

/* BOTONES */
const btnAvatar = document.querySelector(".izquierda");

/* PARTICULAS */
const contenedor = document.querySelector('.particulas');

for (let i = 0; i < 30; i++) {
  let p = document.createElement('span');
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (3 + Math.random() * 5) + 's';
  contenedor.appendChild(p);
}

/* LUCIERNAGAS */
const contLuciernagas = document.querySelector('.luciernagas');

for (let i = 0; i < 15; i++) {
  let l = document.createElement('span');
  l.classList.add("luz");
  l.style.left = Math.random() * 100 + '%';
  l.style.top = Math.random() * 100 + '%';
  l.style.animationDuration = (5 + Math.random() * 5) + 's';
  contLuciernagas.appendChild(l);
}

for (let i = 0; i < 5; i++) {
  let img = document.createElement('span');
  img.classList.add("img-luciernaga");
  img.style.left = Math.random() * 100 + '%';
  img.style.top = Math.random() * 100 + '%';
  img.style.animationDuration = (6 + Math.random() * 5) + 's';
  contLuciernagas.appendChild(img);
}

/* LUCES QUE SIGUEN EL MOUSE */
let mouseX = 0;
let mouseY = 0;

const tunel = document.querySelector(".tunel");

function actualizarMouse(e) {
  const rect = tunel.getBoundingClientRect();

  if (e.touches) {
    mouseX = e.touches[0].clientX - rect.left;
    mouseY = e.touches[0].clientY - rect.top;
  } else {
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
  }
}

document.addEventListener("mousemove", actualizarMouse);
document.addEventListener("touchmove", actualizarMouse);

/* LUCES */
const luces = document.querySelectorAll(".luz, .img-luciernaga");

luces.forEach(luz => {
  luz.x = Math.random() * tunel.clientWidth;
  luz.y = Math.random() * tunel.clientHeight;
});

const ka = document.getElementById("ka-luz");

function obtenerCentroKa() {
  const rect = ka.getBoundingClientRect();
  const tunelRect = tunel.getBoundingClientRect();

  return {
    x: rect.left - tunelRect.left + rect.width / 2,
    y: rect.top - tunelRect.top + rect.height / 2
  };
}

/* ANIMACIÓN */
function animar() {
  const kaCentro = obtenerCentroKa();

  luces.forEach((luz, i) => {
    let dxMouse = mouseX - luz.x;
    let dyMouse = mouseY - luz.y;
    let distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

    let dxKa = kaCentro.x - luz.x;
    let dyKa = kaCentro.y - luz.y;
    let distKa = Math.sqrt(dxKa * dxKa + dyKa * dyKa);

    if (distKa < 200) {
      luz.x += dxKa * 0.04;
      luz.y += dyKa * 0.04;
    } else {
      if (i % 2 === 0) {
        luz.x += dxMouse * 0.02;
        luz.y += dyMouse * 0.02;
      }
    }

    luz.style.transform = `translate(${luz.x}px, ${luz.y}px)`;
  });

  requestAnimationFrame(animar);
}

animar();

/* LIBELULAS */
const contLibelulas = document.querySelector('.libelulas');

for (let i = 0; i < 4; i++) {
  let d = document.createElement('span');
  d.classList.add("libelula");
  d.style.top = Math.random() * 80 + '%';
  d.style.animationDuration = (10 + Math.random() * 5) + 's';
  contLibelulas.appendChild(d);
}

/* KA */
let mensajesKa = [
  "Bienvenida… este lugar te estaba esperando 🌿",

  "Antes de caminar por el Tepuy… debes despertar tu verdadera forma ✨",

  "Tu avatar no será solo una imagen… será tu esencia en este universo 💛",

  "Cuando estés listo… crea tu presencia y el portal se abrirá 🌙"
];

let pasoKa = 0;

function siguienteKa() {
  pasoKa++;
  const texto = document.getElementById("ka-texto");

  if (pasoKa < mensajesKa.length) {
    texto.innerText = mensajesKa[pasoKa];

    if (pasoKa === 2) {
      btnAvatar.classList.add("destacar");
    }

  } else {
    document.getElementById("ka-cuadro").style.display = "none";
  }
}

/* BOTÓN CREAR AVATAR */
btnAvatar.onclick = () => {
  window.location.href = "avatar.html";
};

/* SONIDO */
document.body.addEventListener("click", () => {
  document.getElementById("sonidoAmbiente").play();
}, { once: true });</script>

<audio id="sonidoAmbiente" loop preload="auto">
  <source src="bosque.mp3" type="audio/mpeg">
</audio>
</body>
</html>
