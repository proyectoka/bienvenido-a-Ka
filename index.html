<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ka – Universo Yelioki</title>

<style>
/* ===== CUERPO Y FONDO ===== */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background-image: url('fondo_nuevo.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* ===== TITULO MAGICO ===== */
.titulo {
  position: absolute;
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  width: 650px;
  z-index: 3;
  animation: flotarTitulo 6s ease-in-out infinite, brillo 3s ease-in-out infinite;
}

@keyframes flotarTitulo {
  0% { transform: translateX(-50%) translateY(0px); }
  50% { transform: translateX(-50%) translateY(-8px); }
  100% { transform: translateX(-50%) translateY(0px); }
}

@keyframes brillo {
  0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
  50% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.6)); }
  100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
}

/* ===== TEPUY ===== */
.tepuy {
  position: absolute;
  bottom: 5%;
  left: 50%;
  width: 600px;
  transform: translateX(-50%);
  z-index: 2;
  animation: flotarTepuy 10s ease-in-out infinite;
}

@keyframes flotarTepuy {
  0% { transform: translateX(-50%) translateY(0px); }
  50% { transform: translateX(-50%) translateY(-10px); }
  100% { transform: translateX(-50%) translateY(0px); }
}

/* ===== NUBES ===== */
.cloud {
  position: absolute;
  cursor: pointer;
  z-index: 3;
  animation: flotar 6s ease-in-out infinite;
  transition: transform 0.3s ease, filter 0.3s ease;
}

.cloud:hover {
  transform: scale(1.1);
  filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
}

/* NUBES POSICIONES */
.cloud1 { top: 20%; left: 10%; width: 260px; animation-delay: 0s; }
.cloud2 { top: 25%; right: 10%; width: 240px; animation-delay: 2s; }
.cloud3 { top: 50%; left: 45%; width: 280px; animation-delay: 4s; }

@keyframes flotar {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}

/* TEXTO */
.text {
  position: absolute;
  top: 10%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 26px;
  z-index: 3;
}

/* ===== PORTAL ===== */
#portal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #ffffff, #48B2BA);
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease;
  z-index: 10;
}

#portal.active {
  opacity: 1;
}

/* ===== PARTICULAS ===== */
.particulas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.particulas span {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #FDBE50;
  border-radius: 50%;
  opacity: 0.7;
  animation: flotarParticulas linear infinite;
}

@keyframes flotarParticulas {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 0.8; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* ===== MENSAJE KA ===== */
.mensaje-ka {
  letter-spacing: 1px;
  position: absolute;
  bottom: 10%;
  width: 100%;
  text-align: center;
  color: #FDBE50;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
  font-size: 24px;
  z-index: 3;
  opacity: 0;
  animation: aparecer 3s ease forwards;
}

@keyframes aparecer {
  to { opacity: 1; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .titulo { width: 320px; top: 6%; }
  .tepuy { width: 300px; }
  .cloud1 { width: 180px; left: 10%; top: 18%; }
  .cloud2 { width: 160px; right: 10%; top: 20%; }
  .cloud3 { width: 180px; top: 40%; left: 35%; }
}

/* ===== AVATAR USUARIO ===== */
.avatar-usuario {
  position: absolute;
  bottom: 12%;
  left: 50%;
  transform: translateX(-50%);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
  z-index: 4;
  overflow: hidden;
  transition: all 1s ease;
}

.nombre-usuario {
  position: absolute;
  bottom: 6%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 16px;
  z-index: 4;
}

/* ===== EFECTO MAGICO ===== */
#magia {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(72,178,186,0.6));
  opacity: 0;
  z-index: 9;
  transition: opacity 0.8s ease;
}

</style>
</head>

<body>
<div class="mensaje-ka" id="mensaje">
  <span id="texto"></span>
</div>

<!-- FONDO -->
<img class="fondo" src="fondo_nuevo.jpg">

<!-- TITULO -->
<img class="titulo" src="titulo_ka.png" alt="Bienvenido a Ka">

<!-- TEPUY -->
<img class="tepuy" src="tepuy.png">

<!-- NUBES -->
<img class="cloud cloud1" src="nube1.png" onclick="irANube(event, 'invitaciones.html')">
<img class="cloud cloud2" src="nube2.png" onclick="irANube(event,'llaves.html')">
<img class="cloud cloud3" src="nube3.png" onclick="irANube(event,'disenos.html')">

<!-- AVATAR USUARIO -->
<div class="avatar-usuario" id="avatarUsuario"></div>
<div class="nombre-usuario" id="nombreUsuario"></div>

<!-- PORTAL -->
<div id="portal"></div>
<div id="magia"></div>

<!-- PARTICULAS -->
<div class="particulas"></div>

<!-- AUDIO -->
<audio id="musica" loop>
  <source src="sonido.mp3" type="audio/mpeg">
</audio>
<audio id="magicSound">
  <source src="magia.mp3" type="audio/mpeg">
</audio>

<script>
// PARTICULAS DORADAS
const contenedor = document.querySelector('.particulas');
for (let i = 0; i < 30; i++) {
  let p = document.createElement('span');
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (3 + Math.random() * 5) + 's';
  p.style.opacity = Math.random();
  contenedor.appendChild(p);
}

// MENSAJE KA
const mensaje = "Bienvenido a Ka ✨ Un mundo donde cada nube guarda una historia...";
let i = 0;
const velocidad = 50;
function escribirTexto() {
  if (i < mensaje.length) {
    document.getElementById("texto").innerHTML += mensaje.charAt(i);
    i++;
    setTimeout(escribirTexto, velocidad);
  } else {
    setTimeout(() => {
      document.getElementById("mensaje").style.transition = "opacity 2s";
      document.getElementById("mensaje").style.opacity = "0";
    }, 2000);
  }
}
escribirTexto();

// AUDIO
const audio = document.getElementById("musica");
document.getElementById("magicSound").play();

// CARGAR AVATAR
const avatarUsuario = document.getElementById("avatarUsuario");
const nombreUsuario = document.getElementById("nombreUsuario");

const nombre = localStorage.getItem("nombreAvatar");
const personaje = localStorage.getItem("personajeAvatar");

// Mostrar nombre
nombreUsuario.textContent = nombre || "Viajero";

// Mostrar avatar
if (personaje) {
  const img = document.createElement("img");
  img.src = personaje;
  img.alt = "Avatar mágico";
  img.style.width = "100%";
  img.style.height = "100%";
  img.style.borderRadius = "50%";
  avatarUsuario.innerHTML = "";
  avatarUsuario.appendChild(img);
} else {
  avatarUsuario.style.background = "#FDBE50";
}

// MOVER AVATAR A NUBES
function irANube(event, pagina) {
  const magia = document.getElementById("magia");
  const rect = event.target.getBoundingClientRect();

  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;

  avatarUsuario.style.left = x + "px";
  avatarUsuario.style.top = y + "px";

  localStorage.setItem("destino", pagina);

  setTimeout(() => {
    magia.classList.add("activo");
  }, 500);

  setTimeout(() => {
    window.location.href = "carga.html";
  }, 1200);
}
</script>

</body>
</html>
</body>
</html>
