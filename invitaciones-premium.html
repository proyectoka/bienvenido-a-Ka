<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Yelioki – Ka</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background-image: url('fondo_vitrina.jpg');
  background-size: cover;
  background-position: center;
  color: white;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.2);
  z-index: 0;
}

/* VOLVER */
.volver {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  text-decoration: none;
  font-size: 18px;
  z-index: 10;
}

/* HEADER */
.header-tienda {
  text-align: center;
  margin-top: 20px;
  position: relative;
  z-index: 2;
}
.logo { width: 200px; }

/* ESCENA FLEX */
.escena {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 60px;
  height: 80vh;
  position: relative;
  z-index: 2;
  flex-wrap: wrap;
}

/* VITRINAS */
.vitrina {
  width: 230px;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255,255,255,0.3);
  box-shadow: 0 0 10px rgba(255,255,255,0.2),
              0 0 25px rgba(72,178,186,0.3),
              0 10px 30px rgba(0,0,0,0.2);
  animation: flotar 6s ease-in-out infinite;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.vitrina video { width: 100%; display: block; }

.vitrina span {
  display: block;
  padding: 10px;
  text-align: center;
  font-size: 14px;
}

.vitrina:hover {
  transform: scale(1.2) translateY(-10px);
  z-index: 5;
  box-shadow:
    0 0 25px rgba(255,255,255,0.6),
    0 0 50px rgba(253,190,80,0.8),
    0 20px 60px rgba(0,0,0,0.4);
}

/* FLOTAR */
@keyframes flotar {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* FLASH */
#flash {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.6s ease;
  z-index:15;
}

#flash.active { opacity:1; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .vitrina { width: 180px; }
  .escena { gap: 40px; }
}
</style>
</head>

<body>

<a class="volver" href="index.html">← Volver a Ka</a>

<div class="header-tienda">
  <img src="logo_yelioki.png" class="logo">
  <p>Creaciones mágicas que conectan emociones ✨</p>
</div>

<div class="escena">

  <!-- VITRINA 1 -->
  <div class="vitrina" onclick="abrirPortal(this, event)">
    <video autoplay muted loop playsinline>
      <source src="video_invitaciones.mp4" type="video/mp4">
    </video>
    <span>💌 Invitaciones</span>
  </div>

  <!-- VITRINA 2 -->
  <div class="vitrina" onclick="abrirPortal2(this, event)">
    <video autoplay muted loop playsinline>
      <source src="video_plantillas.mp4" type="video/mp4">
    </video>
    <span>🎨 Plantillas digitales</span>
  </div>

  <!-- VITRINA 3 -->
  <div class="vitrina" onclick="abrirPortal3(this, event)">
    <video autoplay muted loop playsinline>
      <source src="video_3d.mp4" type="video/mp4">
    </video>
    <span>🧱 Modelos 3D</span>
  </div>

</div>

<div id="flash"></div>

<script>
function abrirPortal(el, e){
  e.stopPropagation();
  const flash = document.getElementById("flash");
  el.style.animation = "none";
  el.classList.add("portal-activo");
  setTimeout(()=>{ flash.classList.add("active"); }, 400);
  setTimeout(()=>{ window.location.href="galeria.html"; }, 1200);
}
function abrirPortal2(el, e){
  e.stopPropagation();
  const flash = document.getElementById("flash");
  el.classList.add("portal-activo");
  setTimeout(()=>{ flash.classList.add("active"); }, 400);
  setTimeout(()=>{ window.location.href="plantillas.html"; }, 1200);
}
function abrirPortal3(el, e){
  e.stopPropagation();
  const flash = document.getElementById("flash");
  el.classList.add("portal-activo");
  setTimeout(()=>{ flash.classList.add("active"); }, 400);
  setTimeout(()=>{ window.location.href="modelos3d.html"; }, 1200);
}
</script>

</body>
</html>
