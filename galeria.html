<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería – Yelioki</title>

<style>

/* ===== FONDO ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background-image: url('fondo_galeria.jpg');
  background-size: cover;
  background-position: center;
  color: white;
}

/* CAPA OSCURA */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  top: 0;
  left: 0;
  z-index: 0;
}

/* CONTENIDO */
.contenido {
  position: relative;
  z-index: 2;
}

/* VOLVER */
.volver {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  text-decoration: none;
  font-size: 18px;
  z-index: 5;
}

/* HEADER */
.header {
  text-align: center;
  padding-top: 40px;
}

.logo {
  width: 180px;
}

/* GALERIA */
.galeria {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  padding: 40px;
}

/* TARJETAS */
.card {
  width: 260px;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  transition: 0.3s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card:hover {
  transform: scale(1.05);
}

.card video,
.card img {
  width: 100%;
}

/* BOTONES */
.botones {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
}

.btn {
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  width: 80%;
  font-weight: bold;
}

.btn-ver {
  background: #FDBE50;
  color: #333;
}

.btn-wsp {
  background: #25D366;
  color: white;
}

/* 🔥 BOTON AUDIO (FIX TOTAL) */
#btnAudio {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(72,178,186,0.8);
  border: none;
  padding: 12px 16px;
  border-radius: 25px;
  color: white;
  cursor: pointer;
  z-index: 99999; /* 🔥 ULTRA ARRIBA */
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<!-- 🔊 BOTON SONIDO -->
<button id="btnAudio">🔊 Activar sonido</button>

<!-- 🎵 AUDIO -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="contenido">

<a class="volver" href="invitaciones.html">← Volver</a>

<div class="header">
  <img src="logo_yelioki.png" class="logo">
  <p>Creaciones mágicas ✨</p>
</div>

<div class="galeria">

  <!-- VIDEO -->
  <div class="card">
    <video autoplay muted loop playsinline>
      <source src="cumple-video.mp4" type="video/mp4">
    </video>

    <div class="botones">
      <button class="btn btn-ver" onclick="window.location.href='inv1.html'">💌 Ver</button>
      <a href="https://wa.me/56932938800" target="_blank">
        <button class="btn btn-wsp">💚 Pedir</button>
      </a>
    </div>
  </div>

  <!-- IMAGEN -->
  <div class="card">
    <img src="cumple2.jpg">

    <div class="botones">
      <button class="btn btn-ver" onclick="window.location.href='inv2.html'">💌 Ver</button>
      <a href="https://wa.me/56932938800" target="_blank">
        <button class="btn btn-wsp">💚 Pedir</button>
      </a>
    </div>
  </div>

</div>

</div>

<!-- SCRIPT -->
<script>
const audio = document.getElementById("musica");
const btn = document.getElementById("btnAudio");

btn.addEventListener("click", () => {
  audio.play();
  btn.style.display = "none";
});
</script>

</body>
</html>
