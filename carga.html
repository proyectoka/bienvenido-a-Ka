<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Viajando – Ka</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #48B2BA, #000);
}

/* TUNEL */
.tunel {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 70%);
  animation: girar 10s linear infinite;
}

/* PARTICULAS */
.particula {
  position: absolute;
  width: 4px;
  height: 20px;
  background: white;
  opacity: 0.7;
  animation: viajar 2s linear infinite;
}

@keyframes viajar {
  0% {
    transform: translateY(-100vh) scale(0.5);
    opacity: 0;
  }
  50% { opacity: 1; }
  100% {
    transform: translateY(100vh) scale(1.2);
    opacity: 0;
  }
}

@keyframes girar {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* TEXTO */
.texto {
  position: absolute;
  bottom: 10%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="tunel"></div>
<div class="texto">Viajando entre mundos...</div>

<script>
// partículas
for (let i = 0; i < 60; i++) {
  let p = document.createElement('div');
  p.classList.add("particula");

  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (1 + Math.random() * 2) + 's';

  document.body.appendChild(p);
}

// destino guardado
const destino = localStorage.getItem("destino");

// redirección
setTimeout(() => {
  window.location.href = destino || "index.html";
}, 2500);
</script>

</body>
</html>
